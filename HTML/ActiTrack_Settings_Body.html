<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ActiTrack - 個人資料更新</title>
  <link rel="stylesheet" href="actitrack-style.css" />
  <style>
    /* !important 覆蓋共用 CSS，讓主內容區可捲動 */
    .main-content { overflow-y: auto !important; padding-bottom: 40px; }

    /* 卡片群縱向置中排列 */
    .body-settings-container { display: flex; flex-direction: column; align-items: center; gap: 25px; padding-top: 20px; }

    /* 設定卡片：max-width 避免過寬 */
    .setting-card { background-color: #dcdcdc; border-radius: 20px; padding: 30px 50px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 900px; }
    
    /* 卡片標題列（下邊框作為分隔線） */
    .card-header { text-align: left; margin-bottom: 5px; border-bottom: 2px solid #bbb; padding-bottom: 10px; }
    .card-title { font-size: calc(1.5vw + 10px); font-weight: bold; color: #333; }
    
    /* 輸入欄位兩欄排列 */
    .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }

    /* 單一輸入群組：標籤 + 輸入框縱向排列 */
    .input-group { display: flex; flex-direction: column; gap: 8px; }
    .input-group label { font-size: 1.2rem; font-weight: bold; color: #444; }
    /* 必填欄位的紅色星號 */
    .required-mark { color: #e74c3c; margin-left: 4px; }
    
    /* 輸入框外框：文字輸入 + 單位標籤橫向排列 */
    .input-wrapper { display: flex; align-items: center; background-color: #fff; border-radius: 8px; border: 1px solid #ccc; overflow: hidden; }
    .input-wrapper input { flex: 1; border: none; padding: 12px 15px; font-size: 1.2rem; outline: none; color: #333; width: 100%; }
    /* 單位標籤（cm / kg 等），灰底靠右 */
    .unit { padding: 0 15px; font-size: 1.1rem; color: #666; font-weight: bold; background-color: #f0f0f0; height: 100%; display: flex; align-items: center; border-left: 1px solid #ccc; white-space: nowrap; }
    
    /* 按鈕列靠右對齊 */
    .action-row { display: flex; justify-content: flex-end; gap: 20px; margin-top: 10px; }
    .btn { padding: 12px 30px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: background-color 0.2s; }
    .btn-save   { background-color: #27ae60; color: white; } /* 綠色：儲存 */
    .btn-save:hover { background-color: #219150; }
    .btn-cancel { background-color: #95a5a6; color: white; } /* 灰色：取消 */
    .btn-cancel:hover { background-color: #7f8c8d; }
  </style>
</head>
<body>
  <button id="restore-btn" class="restore-btn" onclick="toggleSidebar()">☰</button>

  <div class="container" id="container">

    <div class="sidebar" id="sidebar">
      <div class="header">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <div class="title" onclick="window.location.href='ActiTrack_Interface.html'" style="cursor: pointer;">ActiTrack返回系統</div>
      </div>
      <div class="menu-section">
        <div class="menu-item" onclick="toggleSubmenu('submenu1')">
          <span>設定</span>
          <span class="dropdown-icon rotated" id="icon1">▼</span>
        </div>
        <div class="submenu" id="submenu1" style="display: block;">
          <div class="submenu-item" onclick="window.location.href='ActiTrack_Settings_Profile.html'">使用者設定</div>
          <div class="submenu-item active" onclick="window.location.href='ActiTrack_Settings_Body.html'">個人資料更新</div>
          <div class="submenu-item" onclick="window.location.href='ActiTrack_Params_Editor.html?source=settings'">運動參數調整</div>
        </div>
        
        <div class="menu-item" onclick="toggleSubmenu('submenu2')">
          <span>使用教學</span>
          <span class="dropdown-icon" id="icon2">▼</span>
        </div>
        <div class="submenu" id="submenu2" style="display: none;">
          <div class="submenu-item" onclick="window.location.href='ActiTrack_Settings_Tutorial.html?topic=system_guide'">系統操作教學</div>
          <div class="submenu-item" onclick="window.location.href='ActiTrack_Settings_Tutorial.html?topic=delete_bmi'">如何刪除我的BMI紀錄</div>
        </div>
      </div>
      
      <div class="user-section">
        <div class="user-info-container">
          <div class="user-icon">
            <img id="sidebar-user-avatar" src="" style="width:100%; height:100%; object-fit:cover; display:none;">
            <svg id="sidebar-user-placeholder" class="avatar-placeholder" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          </div>
          <div class="user-name">user</div>
        </div>
        <div class="settings-icon" onclick="window.location.href='ActiTrack_Interface.html'" title="返回主畫面" style="display: flex; align-items: center; justify-content: center;">
            <svg viewBox="0 0 24 24" fill="currentColor" style="width: 1em; height: 1em;"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </div>
      </div>
    </div>

    <div class="resizer" id="resizer"></div>

    <div class="main-content">
      <div style="font-size: calc(2vw + 10px); font-weight: bold; padding: 2% 0; color: #333;">個人資料更新</div>
      
      <div class="body-settings-container">
        
        <div class="setting-card">
          <div class="card-header"><div class="card-title">基本生理數據</div></div>
          <div class="data-grid">
            <div class="input-group">
              <label>身高<span class="required-mark">*</span></label>
              <div class="input-wrapper"><input type="number" id="input-height" placeholder="必填" min="50" max="300" /><span class="unit">cm</span></div>
            </div>
            <div class="input-group">
              <label>體重<span class="required-mark">*</span></label>
              <div class="input-wrapper"><input type="number" id="input-weight" step="0.1" placeholder="必填" min="10" max="500" /><span class="unit">kg</span></div>
            </div>
            <div class="input-group">
              <label>年齡</label>
              <div class="input-wrapper"><input type="number" id="input-age" placeholder="選填" min="1" max="150" /><span class="unit">歲</span></div>
            </div>
            <div class="input-group">
              <label>出生年月日</label>
              <div class="input-wrapper"><input type="date" id="input-dob" max="2100-12-31" min="1900-01-01" /></div>
            </div>
          </div>
        </div>

        <div class="setting-card">
          <div class="card-header">
            <div class="card-title">進階生理數據 <span style="font-size: 1rem; color: #666; font-weight: normal;">(選填)</span></div>
          </div>
          <div class="data-grid">
            <div class="input-group">
              <label>體脂率</label>
              <div class="input-wrapper"><input type="number" id="input-bf" step="0.1" placeholder="例如: 22.5" min="0" max="100" /><span class="unit">%</span></div>
            </div>
            <div class="input-group">
              <label>骨骼肌重</label>
              <div class="input-wrapper"><input type="number" id="input-muscle" step="0.1" placeholder="例如: 32.1" min="0" max="200" /><span class="unit">kg</span></div>
            </div>
            <div class="input-group">
              <label>基礎代謝率 (BMR)</label>
              <div class="input-wrapper"><input type="number" id="input-bmr" placeholder="例如: 1650" min="500" max="5000" /><span class="unit">kcal</span></div>
            </div>
          </div>
          
          <div class="action-row">
            <button class="btn btn-cancel" onclick="window.location.href='ActiTrack_Settings_Profile.html'">取消</button>
            <button class="btn btn-save" onclick="saveBodySettings()">儲存並更新</button>
          </div>
        </div>

      </div>
    </div>
  </div>
  
  <div class="input-wrapper" style="display:none;">
    <input type="text" id="user-name-input" value="User">
  </div>

  <script src="js/actitrack-settings-ui.js"></script>   <script src="js/ActiTrack_Settings_Body.js"></script>  <script src="js/ActiTrack_User_Sync.js"></script>      </body>
</html>
